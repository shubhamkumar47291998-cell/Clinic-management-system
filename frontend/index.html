<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Health Clinic - Premium Multi-Specialty Clinic & Online Booking</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Aura Health Clinic offers premium healthcare, advanced EMR logs, and online doctor booking for clinical care. Connect with general physicians, cardiologists and pediatrics." />
    <meta name="keywords" content="Aura Health Clinic, clinic management, online appointment booking, digital prescriptions, EMR, cardiology, pediatrics" />
    <meta name="author" content="Aura Health Network" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook / LinkedIn) Meta Tags -->
    <meta property="og:title" content="Aura Health Clinic - Premium Multi-Specialty Clinic & Virtual EMR Portal" />
    <meta property="og:description" content="Book online consultations, search doctor profiles, and manage billing securely at Aura Health Clinic." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aura-hospital.com/" />
    <meta property="og:image" content="https://aura-hospital.com/og-image.png" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aura Health Clinic - Premium Multi-Specialty Clinic" />
    <meta name="twitter:description" content="Book online consultations, search doctor profiles, and manage billing securely at Aura Health Clinic." />
    <meta name="twitter:image" content="https://aura-hospital.com/og-image.png" />

    <!-- MedicalClinic Schema Markup (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MedicalClinic",
      "name": "Aura Health Clinic",
      "alternateName": "Aura Healthcare Network",
      "url": "https://aura-hospital.com",
      "logo": "https://aura-hospital.com/favicon.svg",
      "image": "https://aura-hospital.com/og-image.png",
      "telephone": "+91-9988776655",
      "email": "contact@aura-hospital.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Sankhalim",
        "addressLocality": "Sankhalim",
        "addressRegion": "GA",
        "postalCode": "403505",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 15.5606,
        "longitude": 73.9669
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": [
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday",
            "Saturday"
          ],
          "opens": "08:00",
          "closes": "20:00"
        }
      ],
      "medicalSpecialty": [
        "CardiovascularMedicine",
        "Pediatrics",
        "GeneralPractice"
      ],
      "availableService": [
        {
          "@type": "MedicalProcedure",
          "name": "OPD General Consultation",
          "description": "General medicine consulting and diagnostic triage checks."
        },
        {
          "@type": "MedicalProcedure",
          "name": "Electrocardiogram (ECG)",
          "description": "Heart activity monitoring and coronary records logging."
        }
      ]
    }
    </script>
  </head>
